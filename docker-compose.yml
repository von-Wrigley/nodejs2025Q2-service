services:
  app:
    build:
      context: .             
      dockerfile: Dockerfile.app
    container_name: app
    volumes:
    # - .:/app
    - /app/node_modules
    - ./node_modules/.prisma:/app/node_modules/.prisma
    # - /app/node_modules/.prisma
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: 'postgresql://homeLib:12345@postgres:5432/myDB?schema=public&connect_timeout=300'
            
 
    networks:
      - prisma-network
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    build:
      context: .               
      dockerfile: Dockerfile.db
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_DB=myDB
      - POSTGRES_USER=homeLib
      - POSTGRES_PASSWORD=12345
    ports:
     - '5433:5432'
    networks:
      - prisma-network
    healthcheck:
      test: ["CMD-SHELL",  "pg_isready -U homeLib -d myDB"]
      interval: 5s
      timeout: 2s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data 
      - postgres_logs:/var/log/postgresql  
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  prisma-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_logs: