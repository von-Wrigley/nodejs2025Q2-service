services:
  app:
    build:
      context: .             
      dockerfile: Dockerfile.app
    container_name: app
    restart: always
    volumes:
    # - .:/app
    - /app/node_modules
    - ./node_modules/.prisma:/app/node_modules/.prisma
    # - /app/node_modules/.prisma
    ports:
      - '${PORT}:${PORT}'
    environment:
      DATABASE_URL: ${URL_DATA}
            
 
    networks:
      - prisma-network
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    build:
      context: .               
      dockerfile: Dockerfile.db
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
     - '5433:5432'
    networks:
      - prisma-network
    healthcheck:
      test: ["CMD-SHELL",  "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 2s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data 
      - postgres_logs:/var/log/postgresql  
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  prisma-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_logs: